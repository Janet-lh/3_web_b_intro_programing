<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formularios</title>
    <link rel="icon" href="./src/documento-legal.png">
</head>
<body>
    <h1>Formulario de inscripcion</h1>

    <form>

        <div>
            <p>Title</p>
            <input type="radio" name="title" id="mr">
            <label for="mr">Mr</label>
            <input type="radio" name="title" id="mrs">
            <label for="mrs">Mrs</label>
            <input type="radio" name="title" id="miss">
            <label for="miss">Miss  </label>
        </div>

        <div>
            <p>Title</p>
            <input type="radio" name="title" id="mrs">
            <label for="mrs">Mr</label>
        </div>

        <div>
            <label for="firstName">First Name</label>
            <br>
            <input type="text" id="firstName" placeholder="Joshua...">
        </div>

        <div>
            <label for="lastName">Last Name</label>
            <br>
            <input type="text" id="lastName" placeholder="Sanchez...">
        </div>

        <div>
            <label for="email">Email</label>
            <br>
            <input type="email" id="email" placeholder="JoshuaSandel@...">
        </div>

        <div>
            <label for="phone">Phone number</label>
            <br>
            <input type="number" id="phone" placeholder="9545121897">
        </div>
        
        <div>
            <label for="pasword">Pasword</label>
            <br>
            <input type="password" id="pasword">
        </div>

        <div>
            <label for="country">Country</label>
            <br>
                <select name="country" id="country">
                    <option value="mexico">Mexico</option>
                    <option value="colombia">Colombia</option>
                    <option value="japon">Japon</option>
                    <option value="china" selected>China</option>
                </select>
        </div>
        
        <div>
            <input type="checkbox" name="" id="terms">
            <label for="terms">I agree to the terms and conditions</label>
        </div>

        <div>
            <label for="message">Message</label>
            <br>
            <textarea name="message" id="message" cols="30" rows="5" placeholder="write ypur message..."></textarea>
        </div>

        <div>
            <label for="">Your photo</label>
            <br>
            <input type="file" name="" id="photo">

        </div>

        <div>
            <button type="submit">Sign up</button>
            <button>Reset form</button>
        </div>

    </form>
</body>
</html>
